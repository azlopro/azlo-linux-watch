name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build linux/amd64
        run: |
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o azlo-linux-watch-amd64 .

      - name: Build linux/arm64
        run: |
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o azlo-linux-watch-arm64 .

      - name: Create checksums
        run: |
          sha256sum azlo-linux-watch-amd64 azlo-linux-watch-arm64 > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            azlo-linux-watch-amd64
            azlo-linux-watch-arm64
            checksums.txt
          generate_release_notes: true
