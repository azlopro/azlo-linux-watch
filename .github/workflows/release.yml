name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -trimpath \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o azlo-linux-watch-amd64 .
          GOOS=linux GOARCH=arm64 go build -trimpath \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o azlo-linux-watch-arm64 .

      - name: Install nFPM
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build packages
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          for ARCH in amd64 arm64; do
            export ARCH
            # Stage binary under a fixed name so nFPM can find it
            cp "azlo-linux-watch-${ARCH}" azlo-linux-watch-pkg
            # .deb (apt/dpkg)
            nfpm package --config nfpm.yaml --packager deb \
              --target "azlo-linux-watch_${VERSION}_linux_${ARCH}.deb"
            # .rpm (dnf/yum/zypper)
            nfpm package --config nfpm.yaml --packager rpm \
              --target "azlo-linux-watch_${VERSION}_linux_${ARCH}.rpm"
            # .pkg.tar.zst (pacman/yay)
            nfpm package --config nfpm.yaml --packager archlinux \
              --target "azlo-linux-watch_${VERSION}_linux_${ARCH}.pkg.tar.zst"
            rm azlo-linux-watch-pkg
          done

      - name: Create checksums
        run: |
          sha256sum \
            azlo-linux-watch-amd64 \
            azlo-linux-watch-arm64 \
            azlo-linux-watch_${{ github.ref_name }}_linux_amd64.deb \
            azlo-linux-watch_${{ github.ref_name }}_linux_arm64.deb \
            azlo-linux-watch_${{ github.ref_name }}_linux_amd64.rpm \
            azlo-linux-watch_${{ github.ref_name }}_linux_arm64.rpm \
            azlo-linux-watch_${{ github.ref_name }}_linux_amd64.pkg.tar.zst \
            azlo-linux-watch_${{ github.ref_name }}_linux_arm64.pkg.tar.zst \
            > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            azlo-linux-watch-amd64
            azlo-linux-watch-arm64
            azlo-linux-watch_${{ github.ref_name }}_linux_amd64.deb
            azlo-linux-watch_${{ github.ref_name }}_linux_arm64.deb
            azlo-linux-watch_${{ github.ref_name }}_linux_amd64.rpm
            azlo-linux-watch_${{ github.ref_name }}_linux_arm64.rpm
            azlo-linux-watch_${{ github.ref_name }}_linux_amd64.pkg.tar.zst
            azlo-linux-watch_${{ github.ref_name }}_linux_arm64.pkg.tar.zst
            checksums.txt
          generate_release_notes: true

      # ── Publish APT repository to GitHub Pages ─────────────────────────
      - name: Build APT repository
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          sudo apt-get update && sudo apt-get install -y dpkg-dev

          # Create repo structure
          mkdir -p apt-repo/pool apt-repo/dists/stable/main/binary-amd64 apt-repo/dists/stable/main/binary-arm64

          # Copy .deb files
          cp "azlo-linux-watch_${VERSION}_linux_amd64.deb" apt-repo/pool/
          cp "azlo-linux-watch_${VERSION}_linux_arm64.deb" apt-repo/pool/

          # Generate Packages files
          cd apt-repo
          dpkg-scanpackages --arch amd64 pool > dists/stable/main/binary-amd64/Packages
          dpkg-scanpackages --arch arm64 pool > dists/stable/main/binary-arm64/Packages
          gzip -k dists/stable/main/binary-amd64/Packages
          gzip -k dists/stable/main/binary-arm64/Packages

          # Generate Release file
          cd dists/stable
          cat > Release <<EOF
          Origin: azlopro
          Label: azlo-linux-watch
          Suite: stable
          Codename: stable
          Architectures: amd64 arm64
          Components: main
          Description: azlo-linux-watch APT repository
          EOF
          # Remove leading spaces from heredoc
          sed -i 's/^          //' Release

          # Add checksums to Release
          apt-ftparchive release . >> Release
          cd ../../..

      - name: Deploy APT repo to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apt-repo
          destination_dir: apt
          keep_files: true
