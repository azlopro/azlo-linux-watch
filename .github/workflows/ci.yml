name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:

jobs:
  build:
    name: Build & Vet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Build
        run: GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o azlo-linux-watch .
